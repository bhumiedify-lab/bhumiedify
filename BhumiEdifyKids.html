// ── STORAGE (Google Sheets + localStorage fallback) ──
function lget(k,fb){try{const v=localStorage.getItem("bek_"+k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function lset(k,v){try{localStorage.setItem("bek_"+k,JSON.stringify(v));}catch(e){}}

async function apiGet(sheet){
  lset("lastOnline",Date.now());
  try{
    const r=await fetch(API+"?action=getAll&sheet="+encodeURIComponent(sheet)+"&t="+Date.now());
    const j=await r.json();
    if(j.ok&&j.data&&j.data.length>0){lset(sheet,j.data);return j.data;}
    return lget(sheet,null);
  }catch(err){return lget(sheet,null);}
}

async function apiSave(sheet,data){
  lset(sheet,data);
  try{
    const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save",sheet,data})});
    const j=await r.json();
    return j.ok;
  }catch(err){return false;}
}

// MAIN APP
// ═══════════════════════════════════════════════
function App(){
  // ALL STATE AT TOP - no exceptions
  const [auth,      setAuth]      = useState(null);
  const [loading,   setLoading]   = useState(true);
  const [loadMsg,   setLoadMsg]   = useState("Connecting to Google Sheets...");
  const [syncStatus,setSyncStatus]= useState("synced");
  const [tab,       setTab]       = useState("home");
  const [darkMode,  setDarkMode]  = useState(()=>!!localStorage.getItem("bek_dark"));
  const [editInfo,  setEditInfo]  = useState(false);
  const [infoDraft, setInfoDraft] = useState({});

  const [info,        setInfo]        = useState(()=>lget("info",      DEF_INFO));
  const [students,    setStudents]    = useState(()=>lget("students",  DEF_STUDENTS));
  const [teachers,    setTeachers]    = useState(()=>lget("teachers",  DEF_TEACHERS));
  const [attLog,      setAttLog]      = useState(()=>lget("attlog",    {}));
  const [perfLog,     setPerfLog]     = useState(()=>lget("perflog",   {}));
  const [inventory,   setInventory]   = useState(()=>lget("inventory", []));
  const [activities,  setActivities]  = useState(()=>lget("activities",[]));
  const [receipts,    setReceipts]    = useState(()=>lget("receipts",  []));
  const [expenses,    setExpenses]    = useState(()=>lget("expenses",  []));
  const [forthcoming, setForthcoming] = useState(()=>lget("forthcoming",[]));
  const [notes,       setNotes]       = useState(()=>lget("notes",     []));
  const [tasks,       setTasks]       = useState(()=>lget("tasks",     []));
  const [feeData,     setFeeData]     = useState(()=>lget("feedata",   []));
  const [staffList,   setStaffList]   = useState(()=>lget("staff",     DEF_STAFF));
  const [users,       setUsers]       = useState(()=>lget("users",     DEF_USERS));

  // Derived
  const isAdmin   = auth?.role === "admin";
  const isTeacher = auth?.role === "teacher";

  // Load all data from Google Sheets on startup
  useEffect(()=>{
    async function loadAll(){
      setLoading(true);
      try{
        setLoadMsg("Loading students & teachers...");
        const [stu,tch,inv,act,rec,exp,fth,nts,tsk,fdt,stf,alog,plog,usr]=await Promise.all([
          apiGet("students"),apiGet("teachers"),apiGet("inventory"),apiGet("activities"),
          apiGet("receipts"),apiGet("expenses"),apiGet("forthcoming"),apiGet("notes"),
          apiGet("tasks"),apiGet("feedata"),apiGet("staff"),apiGet("attlog"),apiGet("perflog"),apiGet("users")
        ]);
        if(stu&&stu.length)setStudents(stu);
        if(tch&&tch.length)setTeachers(tch);
        if(inv&&inv.length)setInventory(inv);
        if(act&&act.length)setActivities(act);
        if(rec&&rec.length)setReceipts(rec);
        if(exp&&exp.length)setExpenses(exp);
        if(fth&&fth.length)setForthcoming(fth);
        if(nts&&nts.length)setNotes(nts);
        if(tsk&&tsk.length)setTasks(tsk);
        if(fdt&&fdt.length)setFeeData(fdt);
        if(stf&&stf.length)setStaffList(stf);
        if(alog&&alog.length){const obj={};alog.forEach(r=>{if(r.teacherId)obj[r.teacherId]=Array.isArray(r.log)?r.log:(typeof r.log==="string"?JSON.parse(r.log||"[]"):[]);});setAttLog(obj);}
        if(plog&&plog.length){const obj={};plog.forEach(r=>{if(r.teacherId)obj[r.teacherId]=Array.isArray(r.log)?r.log:(typeof r.log==="string"?JSON.parse(r.log||"[]"):[]);});setPerfLog(obj);}
        if(usr&&usr.length)setUsers(usr);
        // Load school info (key-value format)
        const inf=await apiGet("SchoolInfo");
        if(inf&&inf.length){const obj={};inf.forEach(r=>{if(r.key)obj[r.key]=r.value;});if(Object.keys(obj).length>0)setInfo({...DEF_INFO,...obj});}
        setSyncStatus("synced");
      }catch(err){setSyncStatus("offline");console.warn("Load error:",err);}
      setLoading(false);
    }
    loadAll();
  },[]);

  // Save helpers
  async function saveSheet(sheet,data){
    setSyncStatus("saving");
    const ok=await apiSave(sheet,data);
    setSyncStatus(ok?"synced":"error");
    return ok;
  }
  async function saveInfo_(updated){
    const arr=Object.entries(updated).map(([key,value])=>({key,value}));
    setSyncStatus("saving");
    const ok=await apiSave("SchoolInfo",arr);
    setSyncStatus(ok?"synced":"error");
  }
  async function saveAttLog_(log){
    const arr=Object.entries(log).map(([teacherId,logArr])=>({teacherId,log:logArr}));
    setSyncStatus("saving");
    const ok=await apiSave("attlog",arr);
    setSyncStatus(ok?"synced":"error");
    lset("attlog",log);
  }
  async function savePerfLog_(log){
    const arr=Object.entries(log).map(([teacherId,logArr])=>({teacherId,log:logArr}));
    setSyncStatus("saving");
    const ok=await apiSave("perflog",arr);
    setSyncStatus(ok?"synced":"error");
    lset("perflog",log);
  }

  // Tabs
  const ALL_TABS=[
    {id:"home",icon:"🏠",label:"Home"},
    {id:"slides",icon:"🎯",label:"Slides"},
    {id:"activities",icon:"🗓",label:"Activities"},
    {id:"teachers",icon:"👩‍🏫",label:"Teachers"},
    {id:"students",icon:"👧",label:"Students"},
    {id:"inventory",icon:"📦",label:"Inventory"},
    {id:"admissions",icon:"📋",label:"Admissions"},
    {id:"fees",icon:"💰",label:"Fees"},
    {id:"finance",icon:"💼",label:"Finance"},
    {id:"notebook",icon:"📓",label:"Notebook"},
    {id:"connect",icon:"🔗",label:"Connect"},
    {id:"settings",icon:"⚙️",label:"Settings"},
  ];
  const ADMIN_ONLY=new Set(["finance","inventory","admissions","fees","connect","settings"]);
  const TABS=isAdmin?ALL_TABS:ALL_TABS.filter(t=>!ADMIN_ONLY.has(t.id));

  // AUTH GATE — after ALL hooks
  if(loading) return e(LoadScreen,{msg:loadMsg});
  if(!auth)   return e(LoginScreen,{users,onLogin:setAuth});

  const BG=darkMode?"#1A1200":"#FFF8F2";

  async function onRefresh(){
    setLoading(true);setLoadMsg("Refreshing from Google Sheets...");
    // Re-trigger useEffect equivalent
    try{
      const [stu,tch,inv,act,rec,exp,fth,nts,tsk,fdt,stf,alog,plog,usr]=await Promise.all([
        apiGet("students"),apiGet("teachers"),apiGet("inventory"),apiGet("activities"),
        apiGet("receipts"),apiGet("expenses"),apiGet("forthcoming"),apiGet("notes"),
        apiGet("tasks"),apiGet("feedata"),apiGet("staff"),apiGet("attlog"),apiGet("perflog"),apiGet("users")
      ]);
      if(stu&&stu.length)setStudents(stu);
      if(tch&&tch.length)setTeachers(tch);
      if(inv&&inv.length)setInventory(inv);
      if(act&&act.length)setActivities(act);
      if(rec&&rec.length)setReceipts(rec);
      if(exp&&exp.length)setExpenses(exp);
      if(fth&&fth.length)setForthcoming(fth);
      if(nts&&nts.length)setNotes(nts);
      if(tsk&&tsk.length)setTasks(tsk);
      if(fdt&&fdt.length)setFeeData(fdt);
      if(stf&&stf.length)setStaffList(stf);
      if(alog&&alog.length){const obj={};alog.forEach(r=>{if(r.teacherId)obj[r.teacherId]=Array.isArray(r.log)?r.log:[];});setAttLog(obj);}
      if(plog&&plog.length){const obj={};plog.forEach(r=>{if(r.teacherId)obj[r.teacherId]=Array.isArray(r.log)?r.log:[];});setPerfLog(obj);}
      if(usr&&usr.length)setUsers(usr);
      setSyncStatus("synced");
    }catch(e){setSyncStatus("offline");}
    setLoading(false);
  }

  return e("div",{style:{minHeight:600,background:BG,fontFamily:"Nunito Sans,system-ui,sans-serif",color:C.txt}},

    // HEADER
    e("div",{style:{background:"linear-gradient(135deg,#C24E1E,#D4700A,#E8920C)",padding:"0.9rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}},
      e("div",{style:{display:"flex",alignItems:"center",gap:10}},
        e("div",{style:{fontSize:26}},"🌻"),
        e("div",null,
          e("div",{style:{fontSize:14,fontWeight:900,color:"#fff",lineHeight:1.2,fontFamily:"Nunito"}},info.name),
          e("div",{style:{fontSize:9,color:"rgba(255,255,255,.75)",fontWeight:600}},info.tagline))),
      e("div",{style:{display:"flex",alignItems:"center",gap:6}},
        e("div",{style:{background:"rgba(255,255,255,.2)",border:"1.5px solid rgba(255,255,255,.3)",borderRadius:10,padding:"4px 9px",display:"flex",alignItems:"center",gap:5}},
          e("span",{style:{fontSize:12}},auth.icon),
          e("span",{style:{fontSize:10,fontWeight:700,color:"#fff"}},auth.name.split(" ")[0])),
        e("button",{onClick:()=>setAuth(null),style:{background:"rgba(0,0,0,.2)",color:"#fff",border:"1.5px solid rgba(255,255,255,.2)",borderRadius:10,padding:"5px 9px",fontSize:10,fontWeight:700,cursor:"pointer"}},"🚪"))),

    // EDIT INFO MODAL
    editInfo&&isAdmin&&e("div",{style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"flex-end"}},
      e("div",{style:{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem 1rem",width:"100%",maxHeight:"85vh",overflowY:"auto"}},
        e("div",{style:{fontSize:16,fontWeight:900,color:C.txt,marginBottom:14,fontFamily:"Nunito"}},"✏️ Edit School Info"),
        [["School Name","name"],["Tagline","tagline"],["Phone 1","phone1"],["Phone 2","phone2"],["WhatsApp","whatsapp"],["Hours","hours"],["Instagram URL","instagram"],["Facebook URL","facebook"],["Google Business URL","google"],["JustDial URL","justdial"],["Maps URL","mapLink"]].map(([lbl,key])=>
          e(Inp,{key,label:lbl,value:infoDraft[key]||"",onChange:v=>setInfoDraft(d=>({...d,[key]:v}))})),
        e("div",{style:{marginBottom:10}},
          e("div",{style:{fontSize:11,fontWeight:700,color:C.txt2,marginBottom:4}},"About"),
          e("textarea",{value:infoDraft.about||"",onChange:ev=>setInfoDraft(d=>({...d,about:ev.target.value})),className:"inp",style:{minHeight:80}})),
        e("div",{style:{display:"flex",gap:8}},
          e(Btn,{kids:"💾 Save Info",cls:"btn-pri",full:true,onClick:async()=>{const u={...info,...infoDraft};setInfo(u);lset("info",u);await saveInfo_(u);setEditInfo(false);}}),
          e(Btn,{kids:"Cancel",out:true,color:C.pri,full:true,onClick:()=>setEditInfo(false)})))),

    // TAB BAR
    e("div",{className:"tab-bar"},
      TABS.map(t=>e("button",{key:t.id,onClick:()=>setTab(t.id),className:"tab-btn"+(tab===t.id?" active":"")},
        e("span",{style:{fontSize:15}},t.icon),
        e("span",{style:{fontSize:9,fontWeight:700,color:tab===t.id?C.pri:C.txt3,whiteSpace:"nowrap"}},t.label)))),

    // SYNC BADGE + CONTENT
    e("div",{style:{padding:"8px 12px 80px"}},
      e(SyncBadge,{status:syncStatus}),

      tab==="home"       && e(HomeScreen,{info,students,teachers,isAdmin,isTeacher,authName:auth.name,onEdit:()=>{setInfoDraft({...info});setEditInfo(true);}}),
      tab==="slides"     && e(SlidesScreen,null),
      tab==="activities" && e(ActivitiesScreen,{activities,onSave:async ns=>{setActivities(ns);await saveSheet("activities",ns);},isAdmin}),
      tab==="teachers"   && e(TeachersScreen,{teachers,onSave:async nt=>{setTeachers(nt);await saveSheet("teachers",nt);},attLog,onSaveAtt:async nl=>{setAttLog(nl);await saveAttLog_(nl);},perfLog,onSavePerf:async nl=>{setPerfLog(nl);await savePerfLog_(nl);},isAdmin}),
      tab==="students"   && e(StudentsScreen,{students,onSave:async ns=>{setStudents(ns);await saveSheet("students",ns);},isAdmin}),
      tab==="inventory"  && e(InventoryScreen,{inventory,onSave:async ni=>{setInventory(ni);await saveSheet("inventory",ni);},isAdmin}),
      tab==="admissions" && e(AdmissionsScreen,{students,info}),
      tab==="fees"       && e(FeesScreen,null),
      tab==="finance"    && e(FinanceScreen,{students,feeData,onSaveFee:async nd=>{setFeeData(nd);await saveSheet("feedata",nd);},staffList,onSaveStaff:async ns=>{setStaffList(ns);await saveSheet("staff",ns);},receipts,onSaveReceipts:async nr=>{setReceipts(nr);await saveSheet("receipts",nr);},expenses,onSaveExpenses:async ne=>{setExpenses(ne);await saveSheet("expenses",ne);},forthcoming,onSaveForthcoming:async nf=>{setForthcoming(nf);await saveSheet("forthcoming",nf);},isAdmin}),
      tab==="notebook"   && e(NotebookScreen,{notes,onSaveNotes:async nn=>{setNotes(nn);await saveSheet("notes",nn);},tasks,onSaveTasks:async nt=>{setTasks(nt);await saveSheet("tasks",nt);},isAdmin,authName:auth.name}),
      tab==="connect"    && e(ConnectScreen,{info}),
      tab==="settings"   && isAdmin && e(SettingsScreen,{darkMode,onDarkMode:v=>{setDarkMode(v);if(v)localStorage.setItem("bek_dark","1");else localStorage.removeItem("bek_dark");},apiUrl:API,onChangeApi:()=>{},onRefresh,users,onSaveUsers:async nu=>{setUsers(nu);await saveSheet("users",nu);}})
    )
  );
}

// BOOT
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App,null));
</script>
</body>
</html>
